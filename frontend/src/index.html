<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>WhatsStore — Build & Sell via WhatsApp</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="WhatsStore helps small businesses create beautiful websites, showcase products, and receive customer orders directly on WhatsApp — no coding, no complexity.">
  <meta name="theme-color" content="#0d0f14">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Inter+Tight:wght@600;700;800&display=swap" rel="stylesheet">
  <script>
    (function() {
      const theme = localStorage.getItem('ws_theme') || 'dark';
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
        document.documentElement.classList.remove('light');
      } else if (theme === 'light') {
        document.documentElement.classList.add('light');
        document.documentElement.classList.remove('dark');
      } else {
        document.documentElement.classList.add('dark');
        document.documentElement.classList.remove('light');
      }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
