services:
  - type: web
    name: whatsstore-api
    env: node
    plan: free
    region: ohio
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: https://whatsstore.web.app
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
